# Template for tracking the ChatGPT Codex local environment values used for this repo.
# This file is for humans and repository consistency; it is not assumed to be auto-loaded by Codex.

name = "CognusNet Local"
workspace_path = "C:\\Users\\jaked\\git\\cognusnet"

setup_script = """
npm install
npm run build
"""

[[actions]]
name = "Test"
command = "npm test"

[[actions]]
name = "Typecheck"
command = "npm run typecheck"

[[actions]]
name = "Build"
command = "npm run build"

[[actions]]
name = "Start Postgres"
command = "docker compose up -d"

[[actions]]
name = "Apply Schema"
command = "Get-Content src\\infra\\postgres\\migrations\\001_init.sql -Raw | docker exec -i cognusnet-postgres-1 psql -U postgres -d cognusnet"

[[actions]]
name = "Seed Database"
command = "npm run seed"

[[actions]]
name = "Start App"
command = "npm start"

[[actions]]
name = "Health Check"
command = "Invoke-WebRequest -UseBasicParsing http://127.0.0.1:3000/health | Select-Object -ExpandProperty Content"

[[actions]]
name = "Live Retrieve"
command = "npm run client -- retrieve --query \"Where is the auth middleware?\""

[defaults]
base_url = "http://127.0.0.1:3000"
api_key = "test-api-key"
tenant_id = "tenant-alpha"
actor_id = "actor-1"
workspace_id = "workspace-1"
project_id = "project-1"
repository_id = "repository-1"
